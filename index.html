<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS No. Sawaldher</title>
    <script>
      (function() {
        try {
          const hash = window.location.hash || '';
          const search = window.location.search || '';
          const pathname = window.location.pathname || '';
          
          if (
            hash.includes('type=recovery') || 
            search.includes('type=recovery') || 
            pathname.includes('reset-password')
          ) {
            console.log('Early Detection: PASSWORD RECOVERY flow detected in head script.');
            sessionStorage.setItem('is_recovery_flow', 'true');
          }
        } catch (e) {
          console.error('Error in early recovery detection script:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
